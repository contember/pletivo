name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Parse tag
        id: tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing v${VERSION}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build astro-jsx-pages
        run: bun run --cwd packages/astro-jsx-pages build

      - name: Unit & integration tests
        run: bun test tests/unit tests/integration tests/e2e

      - name: Set version
        run: |
          node -e "
            const fs = require('fs');
            const version = '${{ steps.tag.outputs.version }}';
            const p = 'packages/pletivo/package.json';
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            pkg.version = version;
            fs.writeFileSync(p, JSON.stringify(pkg, null, '\t') + '\n');
          "

      - name: Publish pletivo
        working-directory: packages/pletivo
        run: npm publish --provenance --access public
